# ============================================================
#  .github/workflows/deploy.yml
#  Auto-inject BUILD_TIME ke sw.js setiap push ke main
#
#  Cocok untuk: GitHub Pages dari branch main / (root)
#
#  Cara kerja:
#  - Setiap push ke main, Actions replace {{BUILD_TIME}} di sw.js
#    dengan Unix timestamp saat ini
#  - Commit perubahan sw.js balik ke main
#  - GitHub Pages otomatis deploy ulang dari main
#  - Browser deteksi sw.js berubah → SW diinstall ulang → fresh
# ============================================================

name: Inject versi ke sw.js

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'sw.js'   # hindari infinite loop saat commit sw.js

permissions:
  contents: write

jobs:
  inject-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Inject BUILD_TIME ke sw.js
        run: |
          sed -i "s/{{BUILD_TIME}}/$(date +%s)/g" sw.js
          echo "✅ sw.js diupdate: $(grep SW_VERSION sw.js)"

      - name: Commit sw.js yang sudah di-inject
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sw.js
          git diff --cached --quiet || git commit -m "chore: inject BUILD_TIME ke sw.js [skip ci]"
          git push
