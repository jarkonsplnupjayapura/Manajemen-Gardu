<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache">
<title>Cek Versi File PLN</title>
<style>
body{font-family:monospace;background:#0f172a;color:#e2e8f0;padding:20px;font-size:14px;}
h2{color:#38bdf8;}
.ok{color:#4ade80;font-weight:bold;}
.err{color:#f87171;font-weight:bold;}
.warn{color:#fbbf24;font-weight:bold;}
pre{background:#1e293b;padding:12px;border-radius:8px;white-space:pre-wrap;word-break:break-all;font-size:12px;}
button{background:#2563eb;color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:14px;margin:4px;}
</style>
</head>
<body>
<h2>🔍 Cek Versi & Status File PLN</h2>
<p>Halaman ini harus di-upload ke GitHub Pages yang sama dengan aplikasi PLN.<br>
Buka: <code>https://[username].github.io/[repo]/cek.html</code></p>
<button onclick="jalankan()">▶ Jalankan Semua Cek</button>
<button onclick="location.reload()">↺ Reload</button>
<pre id="out">Klik "Jalankan Semua Cek"...</pre>
<script>
function jalankan() {
  var out = [];
  var o = function(s) { out.push(s); render(); };

  o('=== CEK ' + new Date().toLocaleString('id-ID') + ' ===\n');

  // 1. Fetch index.html langsung dari server
  o('📥 Mengambil index.html dari server...');
  fetch('index.html?nocache=' + Date.now(), {cache:'no-store'})
    .then(function(r) {
      o('HTTP status: ' + r.status + ' ' + r.statusText);
      o('Cache-Control: ' + (r.headers.get('cache-control') || '(tidak ada)'));
      o('ETag: ' + (r.headers.get('etag') || '(tidak ada)'));
      o('Last-Modified: ' + (r.headers.get('last-modified') || '(tidak ada)'));
      return r.text();
    })
    .then(function(html) {
      o('Ukuran file: ' + html.length.toLocaleString() + ' karakter');
      o('');

      // 2. Cek marker versi
      var hasV20260609 = html.includes('v20260609');
      var hasPatch     = html.includes('[PLN Patch]') || html.includes('PLN Patch');
      var hasApbtn     = html.includes('apbtn-import');
      var hasImportBtn = html.includes('Import Bulk Inspeksi');
      var hasCsvModal  = html.includes('modal-csv-import');
      var hasBukaModal = html.includes('function bukaModalCsvImport');
      var hasNoCache   = html.includes('no-cache, no-store');
      var hasCacheBust = html.includes('caches.keys');

      o('=== ISI FILE index.html DI SERVER ===');
      o((hasV20260609 ? '✅' : '❌') + ' Cache-bust v20260609: '     + (hasV20260609 ? 'ADA' : 'TIDAK ADA'));
      o((hasPatch     ? '✅' : '❌') + ' Script [PLN Patch]: '        + (hasPatch     ? 'ADA' : 'TIDAK ADA'));
      o((hasApbtn     ? '✅' : '❌') + ' apbtn-import di HTML: '      + (hasApbtn     ? 'ADA' : 'TIDAK ADA'));
      o((hasImportBtn ? '✅' : '❌') + ' Teks "Import Bulk Inspeksi": ' + (hasImportBtn ? 'ADA' : 'TIDAK ADA'));
      o((hasCsvModal  ? '✅' : '❌') + ' modal-csv-import: '           + (hasCsvModal  ? 'ADA' : 'TIDAK ADA'));
      o((hasBukaModal ? '✅' : '❌') + ' function bukaModalCsvImport: ' + (hasBukaModal ? 'ADA' : 'TIDAK ADA'));
      o((hasNoCache   ? '✅' : '❌') + ' Meta no-cache header: '       + (hasNoCache   ? 'ADA' : 'TIDAK ADA'));
      o((hasCacheBust ? '✅' : '❌') + ' caches.keys() cache clear: '  + (hasCacheBust ? 'ADA' : 'TIDAK ADA'));

      o('');
      o('=== KESIMPULAN ===');
      if (!hasImportBtn) {
        o('❌ KRITIS: File di server adalah versi LAMA!');
        o('   → "Import Bulk Inspeksi" sama sekali tidak ada di file.');
        o('   → Upload ulang index.html yang benar ke GitHub.');
      } else if (!hasPatch && !hasApbtn) {
        o('⚠️  File punya teks Import tapi TIDAK punya patch/apbtn.');
        o('   → Ini versi pertengahan. Upload file terbaru.');
      } else if (hasPatch || hasApbtn) {
        o('✅ File di server sudah BENAR (patch/apbtn ada).');
        o('   → Masalah ada di CACHE BROWSER bukan file server.');
        o('   → Coba: Ctrl+Shift+Delete → hapus cache → reload.');
      }

      // 3. Cek ukuran
      o('');
      if (html.length < 600000) {
        o('⚠️  Ukuran file hanya ' + html.length.toLocaleString() + ' — kemungkinan file terpotong atau salah file!');
        o('   File asli harusnya ~680.000+ karakter.');
      } else {
        o('✅ Ukuran file normal (' + html.length.toLocaleString() + ' karakter)');
      }

      // 4. Cari posisi Import Bulk di file
      var idx = html.indexOf('Import Bulk Inspeksi');
      if (idx >= 0) {
        o('');
        o('📍 "Import Bulk Inspeksi" ditemukan di posisi ' + idx);
        o('   Konteks: ...' + html.substring(Math.max(0,idx-50), idx+60).replace(/\n/g,' ') + '...');
      }
    })
    .catch(function(e) {
      o('❌ Gagal fetch index.html: ' + e);
      o('   Pastikan cek.html diupload di folder yang sama dengan index.html');
    });

  function render() {
    document.getElementById('out').textContent = out.join('\n');
  }
  render();
}
</script>
</body>
</html>
